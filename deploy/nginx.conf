server {
    listen 80;
    listen [::]:80;
    server_name flow-image-api.chatapi.fun;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name flow-image-api.chatapi.fun;

    ssl_certificate /etc/letsencrypt/live/flow-image-api.chatapi.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flow-image-api.chatapi.fun/privkey.pem;

    client_max_body_size 24m;

    location / {
        proxy_pass http://127.0.0.1:18446;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
